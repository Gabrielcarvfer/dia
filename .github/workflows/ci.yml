name: CI

# Pipeline:
#   test ─┬─ package-linux  (AppImage) ─┐
#         ├─ package-macos  (DMG)       ├─ virustotal ── release (v* tags only)
#         └─ package-windows(ZIP)       ┘
#
# - Every push to master and every PR runs test + packaging (build validation).
# - VirusTotal scans the artifacts on pushes/tags (skipped on PRs, where the
#   secret is unavailable) and blocks on ANY detection.
# - Pushing a tag like v1.2.0 additionally publishes a GitHub Release with notes
#   generated from the commits since the previous tag and the three artifacts.
#
# Required repo secret: VIRUSTOTAL_API_KEY (GITHUB_TOKEN is provided automatically).

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]

# Keep only the latest run per ref in flight.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ----------------------------------------------------------------- tests ---
  test:
    name: Headless test (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install build + test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            meson ninja-build gcc pkg-config git \
            libgtk-4-dev libadwaita-1-dev libglib2.0-dev libxml2-dev \
            xvfb xauth dbus-x11 at-spi2-core \
            python3-dogtail python3-pyatspi gir1.2-atspi-2.0

      # Sanitizers (-fsanitize=address,undefined) are ON by default for every
      # build via meson.build's default_options, including the release packaging
      # jobs below. run.sh sets ASAN/UBSAN_OPTIONS (LeakSanitizer off — GTK
      # caches; memory-error + UB detection on).
      - name: Configure (GTK4 skeleton, sanitized)
        run: meson setup build

      - name: Build
        run: meson compile -C build

      - name: Run headless UI test suite (ASan/UBSan)
        run: meson test -C build --print-errorlogs

      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: meson-testlog
          path: build/meson-logs/

  # ------------------------------------------------------ package: Linux ---
  package-linux:
    name: Package AppImage (Linux)
    runs-on: ubuntu-latest
    needs: test
    env:
      APPIMAGE_EXTRACT_AND_RUN: 1     # CI runners have no FUSE
      DEPLOY_GTK_VERSION: 4           # tell linuxdeploy-plugin-gtk to bundle GTK4
    steps:
      - uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            meson ninja-build gcc pkg-config git wget file desktop-file-utils \
            libgtk-4-dev libadwaita-1-dev libglib2.0-dev libxml2-dev \
            librsvg2-2 librsvg2-common

      - name: Build and install into AppDir
        run: |
          set -eux
          # Ship a clean release build: no sanitizers. ASan/UBSan instrumentation
          # bloats the binary, needs the ASan runtime at load, and its
          # interceptors/__asan_* symbols trip heuristic AV engines (false
          # "trojan" hits on VirusTotal). The sanitized build is validated by the
          # Linux `test` job; macOS/Windows already ship non-sanitized too.
          meson setup build --prefix=/usr --buildtype=release -Dtests=false \
            -Db_sanitize=none
          meson compile -C build
          DESTDIR="$PWD/AppDir" meson install -C build
          install -Dm644 .github/packaging/org.gnome.Dia.desktop \
            AppDir/usr/share/applications/org.gnome.Dia.desktop
          install -Dm644 data/org.gnome.Dia.svg \
            AppDir/usr/share/icons/hicolor/scalable/apps/org.gnome.Dia.svg

      - name: Build AppImage
        run: |
          set -eux
          base=https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous
          gtkbase=https://raw.githubusercontent.com/linuxdeploy/linuxdeploy-plugin-gtk/master
          wget -q "$base/linuxdeploy-x86_64.AppImage"
          wget -q "$gtkbase/linuxdeploy-plugin-gtk.sh"
          chmod +x linuxdeploy-x86_64.AppImage linuxdeploy-plugin-gtk.sh
          # Don't let GIO dlopen the HOST's gio modules (gvfs, …): they're built
          # against the host's GLib and reference newer symbols
          # (g_variant_builder_init_static) our bundled GLib lacks, spewing
          # "undefined symbol / failed to load module". dia needs no gvfs, so
          # point GIO_MODULE_DIR at the (bundled, possibly empty) AppDir path.
          # linuxdeploy's AppRun sources apprun-hooks/*.sh at startup.
          mkdir -p AppDir/apprun-hooks
          cat > AppDir/apprun-hooks/gio-modules.sh <<'HOOK'
          export GIO_MODULE_DIR="${APPDIR}/usr/lib/x86_64-linux-gnu/gio/modules"
          HOOK
          # The bundled xpm-pixbuf subproject installs libxpm-pixbuf.so.0 under
          # AppDir/usr/lib (on Ubuntu, the multiarch .../lib/x86_64-linux-gnu
          # subdir). Point linuxdeploy at wherever it landed so it can resolve +
          # bundle that NEEDED dependency of dia.
          xpmdir="$(dirname "$(find AppDir -name 'libxpm-pixbuf.so.0' | head -1)")"
          export LD_LIBRARY_PATH="${xpmdir}:$PWD/AppDir/usr/lib${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}"
          ./linuxdeploy-x86_64.AppImage --appdir AppDir --plugin gtk \
            --desktop-file AppDir/usr/share/applications/org.gnome.Dia.desktop \
            --icon-file data/icons/hicolor/256x256/apps/org.gnome.Dia.png \
            --output appimage
          mkdir -p dist && mv Dia*.AppImage dist/

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: dia-linux-appimage
          path: dist/*.AppImage
          if-no-files-found: error

  # ------------------------------------------------------ package: macOS ---
  package-macos:
    name: Package DMG (macOS)
    runs-on: macos-latest
    needs: test
    steps:
      - uses: actions/checkout@v5

      - name: Install dependencies (Homebrew)
        run: |
          brew update
          brew install gtk4 libadwaita meson ninja pkg-config libxml2 dylibbundler \
            librsvg

      - name: Build
        run: |
          set -eux
          # No sanitizers in the shipped .app: dylibbundler can't resolve the
          # @rpath ASan runtime (libclang_rt.asan_osx_dynamic.dylib). The
          # sanitized build is validated by the Linux test job.
          meson setup build --buildtype=release -Dtests=false -Db_sanitize=none
          meson compile -C build

      - name: Assemble .app and DMG
        # Uncomment together with the signing/notarization blocks in the script
        # below to expose the secrets to them:
        # env:
        #   MACOS_CERT_P12: ${{ secrets.MACOS_CERT_P12 }}
        #   MACOS_CERT_PWD: ${{ secrets.MACOS_CERT_PWD }}
        #   MACOS_KEYCHAIN_PWD: ${{ secrets.MACOS_KEYCHAIN_PWD }}
        #   APPLE_ID: ${{ secrets.APPLE_ID }}
        #   APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        #   APPLE_APP_PWD: ${{ secrets.APPLE_APP_PWD }}
        run: |
          set -eux
          APP=Dia.app
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources" "$APP/Contents/libs"
          cp .github/packaging/Info.plist "$APP/Contents/Info.plist"
          cp build/skeleton/dia "$APP/Contents/MacOS/dia"
          # Copy & rewrite the Homebrew dylib dependencies into the bundle.
          # -s adds the meson build dir so dylibbundler can find the bundled
          # xpm-pixbuf subproject's libxpm-pixbuf.0.dylib (not on a standard
          # path); otherwise it prompts interactively and hangs the CI.
          dylibbundler -od -b -cd \
            -x "$APP/Contents/MacOS/dia" \
            -d "$APP/Contents/libs" \
            -p "@executable_path/../libs" \
            -s "$PWD/build/subprojects/xpm-pixbuf"
          # Best-effort runtime data: gdk-pixbuf loaders + compiled GSettings schemas.
          GLIB_PREFIX="$(brew --prefix glib)"
          PIXBUF_PREFIX="$(brew --prefix gdk-pixbuf)"
          mkdir -p "$APP/Contents/Resources/share/glib-2.0/schemas"
          cp -R "$GLIB_PREFIX/share/glib-2.0/schemas/"*.compiled \
            "$APP/Contents/Resources/share/glib-2.0/schemas/" 2>/dev/null || \
            glib-compile-schemas "$APP/Contents/Resources/share/glib-2.0/schemas/" || true
          cp -R "$PIXBUF_PREFIX/lib/gdk-pixbuf-2.0" \
            "$APP/Contents/Resources/" 2>/dev/null || true
          # Shape libraries (Cisco/network/Assorted/…): the app looks for them
          # beside the binary at <exe>/../share/dia/shapes -> Contents/share/….
          mkdir -p "$APP/Contents/share/dia"
          cp -R shapes "$APP/Contents/share/dia/shapes"
          rm -f "$APP/Contents/share/dia/shapes/meson.build" \
                "$APP/Contents/share/dia/shapes/make-midpoint.pl"

          # Dock/Finder icon: render the SVG at each size into an .iconset and
          # pack it into Contents/Resources/dia.icns (Info.plist -> CFBundleIconFile).
          # Best-effort: a missing icon shouldn't fail the release.
          if command -v rsvg-convert >/dev/null; then
            mkdir -p Dia.iconset
            for s in 16 32 64 128 256 512; do
              rsvg-convert -w "$s" -h "$s" data/org.gnome.Dia.svg \
                -o "Dia.iconset/icon_${s}x${s}.png" || true
              rsvg-convert -w "$((s*2))" -h "$((s*2))" data/org.gnome.Dia.svg \
                -o "Dia.iconset/icon_${s}x${s}@2x.png" || true
            done
            iconutil -c icns Dia.iconset -o "$APP/Contents/Resources/dia.icns" || true
          fi

          BIN="$APP/Contents/MacOS/dia"

          # (dylibbundler already bundles libxpm-pixbuf and rewrites dia's load
          # command to @executable_path/../libs, despite warning it "may not"
          # handle the @rpath ref — verified in the build log — so no manual
          # copy is needed. It does, however, convert every one of dia's rpaths
          # to an identical "@executable_path/../libs/", producing duplicate
          # LC_RPATH entries that crash dyld; the dedup below fixes that.)

          # De-duplicate LC_RPATH on the main binary AND every bundled dylib.
          # dylibbundler converts each of a Mach-O's rpaths to an identical
          # "@executable_path/../libs/", so many end up with several duplicate
          # LC_RPATH entries — and modern dyld ABORTS on a duplicate LC_RPATH
          # ("termination reason: DYLD, duplicate LC_RPATH") when loading that
          # file (dia OR e.g. libxpm-pixbuf). Delete extra copies, keeping one of
          # each. Must run BEFORE signing (which seals each file).
          rpaths() { otool -l "$1" | awk '/cmd LC_RPATH/{r=1} r&&/ path /{print $2; r=0}'; }
          for f in "$BIN" "$APP"/Contents/libs/*.dylib; do
            [ -f "$f" ] || continue
            for dup in $(rpaths "$f" | sort | uniq -d); do
              while [ "$(rpaths "$f" | grep -Fxc "$dup")" -gt 1 ]; do
                install_name_tool -delete_rpath "$dup" "$f"
              done
            done
          done

          # Ad-hoc code-sign (free, no Apple account). Apple Silicon refuses to
          # run unsigned arm64 binaries at all, so this is required for the app to
          # launch; it does NOT notarize, so Gatekeeper still shows the "unverified
          # developer" prompt on first open (right-click ▸ Open, or run
          # `xattr -dr com.apple.quarantine Dia.app`). Sign inside-out: bundled
          # dylibs first, then the executable, then the .app bundle.
          find "$APP/Contents/libs" -name '*.dylib' -exec \
            codesign --force --timestamp=none --sign - {} + 2>/dev/null || true
          codesign --force --timestamp=none --sign - "$BIN"
          codesign --force --timestamp=none --sign - "$APP"
          codesign --verify --verbose=2 "$APP" || true

          # For a properly-signed + notarized build (removes the Gatekeeper prompt
          # and most AV false positives) you need a paid "Developer ID Application"
          # cert; wire that up by replacing the `--sign -` above with your identity
          # (+ --options runtime + entitlements) and uncommenting the notarize step
          # below. Not worth €99/yr for a hobby build — ad-hoc is fine.

          # Package into a compressed DMG with an Applications shortcut.
          mkdir -p dmgroot
          cp -R "$APP" dmgroot/
          ln -s /Applications dmgroot/Applications
          mkdir -p dist
          hdiutil create -volname Dia -srcfolder dmgroot \
            -ov -format UDZO dist/Dia.dmg

          # --- OPTIONAL: notarize + staple the DMG (uncomment + add secrets) ---
          # Needs, in addition to the signing secrets above:
          #   APPLE_ID        your Apple ID email
          #   APPLE_TEAM_ID   your 10-char Developer Team ID
          #   APPLE_APP_PWD   an app-specific password (appleid.apple.com)
          # # Submit for notarization and wait, then staple the ticket so the DMG
          # # verifies offline.
          # xcrun notarytool submit dist/Dia.dmg \
          #   --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" \
          #   --password "$APPLE_APP_PWD" --wait
          # xcrun stapler staple dist/Dia.dmg

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: dia-macos-dmg
          path: dist/Dia.dmg
          if-no-files-found: error

  # ----------------------------------------------------- package: Windows ---
  package-windows:
    name: Package ZIP (Windows)
    runs-on: windows-latest
    needs: test
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v5

      - name: Set up MSYS2 (UCRT64)
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            git zip
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-meson
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-pkgconf
            mingw-w64-ucrt-x86_64-gtk4
            mingw-w64-ucrt-x86_64-libadwaita
            mingw-w64-ucrt-x86_64-libxml2

      - name: Build
        run: |
          set -eux
          # MSYS2/UCRT64's gcc linker doesn't support -fsanitize=address,undefined
          # (on by default via meson.build), so turn sanitizers off for Windows.
          meson setup build --buildtype=release -Dtests=false -Db_sanitize=none
          meson compile -C build

      - name: Assemble dist tree
        run: |
          set -eux
          mkdir -p dist/dia/bin dist/dia/lib
          cp build/skeleton/dia.exe dist/dia/bin/
          # The bundled xpm-pixbuf subproject DLL lives in the build tree, not
          # UCRT64, so the ldd sweep below misses it — copy it explicitly.
          cp -u build/subprojects/xpm-pixbuf/libxpm-pixbuf*.dll dist/dia/bin/ \
            2>/dev/null || true
          # GdkPixbuf image loaders (png/jpeg/tiff/svg) are dlopen'd at runtime,
          # so neither they nor their deps (libjpeg/libtiff/librsvg/…) show up in
          # dia.exe's ldd. Bundle the loaders, then run the ldd sweep over BOTH
          # dia.exe and every loader so the transitive closure is complete.
          cp -r /ucrt64/lib/gdk-pixbuf-2.0 dist/dia/lib/ 2>/dev/null || true
          { echo dist/dia/bin/dia.exe
            find dist/dia/lib/gdk-pixbuf-2.0 -name '*.dll' 2>/dev/null; } \
            | while read -r mod; do ldd "$mod" 2>/dev/null; done \
            | awk '/ucrt64/ {print $3}' | sort -u \
            | while read -r dll; do cp -u "$dll" dist/dia/bin/; done
          # Still-missing libs are dlopen'd where no ldd sees them (appstream via
          # libadwaita's About dialog; some cairo/pixbuf backends). Copy the
          # closure of each named lib present in UCRT64 too.
          for lib in libappstream libjpeg libtiff libcairo libpixman librsvg \
                     libpango libgdk_pixbuf; do
            for f in /ucrt64/bin/${lib}*.dll; do
              [ -e "$f" ] || continue
              cp -u "$f" dist/dia/bin/
              ldd "$f" 2>/dev/null | awk '/ucrt64/ {print $3}' \
                | while read -r d; do cp -u "$d" dist/dia/bin/; done
            done
          done
          # GTK4 runtime data: compiled GSettings schemas + icons.
          mkdir -p dist/dia/share/glib-2.0/schemas
          glib-compile-schemas /ucrt64/share/glib-2.0/schemas \
            --targetdir dist/dia/share/glib-2.0/schemas || true
          cp -r /ucrt64/share/icons dist/dia/share/ 2>/dev/null || true
          # Our app icon in the theme so the window/taskbar shows the Dia logo
          # (gtk_window_set_default_icon_name looks it up by name at runtime).
          # PNGs load without the SVG pixbuf loader; ship the SVG too.
          mkdir -p dist/dia/share/icons/hicolor/scalable/apps
          cp -r data/icons/hicolor/. dist/dia/share/icons/hicolor/
          cp data/org.gnome.Dia.svg dist/dia/share/icons/hicolor/scalable/apps/
          # Shape libraries (Cisco/network/…): the app looks for them beside the
          # binary at <exe>/../share/dia/shapes -> dist/dia/share/dia/shapes.
          mkdir -p dist/dia/share/dia
          cp -r shapes dist/dia/share/dia/shapes
          rm -f dist/dia/share/dia/shapes/meson.build \
                dist/dia/share/dia/shapes/make-midpoint.pl
          cd dist && zip -r Dia-win64.zip dia

      - name: Upload ZIP
        uses: actions/upload-artifact@v4
        with:
          name: dia-windows-zip
          path: dist/Dia-win64.zip
          if-no-files-found: error

  # -------------------------------------------------------- VirusTotal gate ---
  virustotal:
    name: VirusTotal scan
    runs-on: ubuntu-latest
    needs: [package-linux, package-macos, package-windows]
    # Skip on PRs: secrets are not exposed to fork PRs, and there is nothing to
    # release. Runs on pushes to master and on tags.
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v5

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Scan artifacts (block on any detection)
        env:
          VIRUSTOTAL_API_KEY: ${{ secrets.VIRUSTOTAL_API_KEY }}
        run: |
          mapfile -t files < <(find artifacts -type f \
            \( -name '*.AppImage' -o -name '*.dmg' -o -name '*.zip' \) | sort)
          echo "Scanning: ${files[*]}"
          bash .github/scripts/virustotal-scan.sh "${files[@]}"

  # -------------------------------------------------------------- release ---
  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: virustotal
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write       # create the release and upload assets
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0    # full history for the changelog

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate release notes
        run: bash .github/scripts/release-notes.sh "${GITHUB_REF_NAME}" > RELEASE_NOTES.md

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          fail_on_unmatched_files: true
          files: |
            artifacts/dia-linux-appimage/*.AppImage
            artifacts/dia-macos-dmg/*.dmg
            artifacts/dia-windows-zip/*.zip
